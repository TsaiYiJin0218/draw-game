<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲主控台後台 👑</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: #fff; padding: 20px; max-width: 650px; margin: 0 auto; }
        .card { background: #34495e; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h2 { margin-bottom: 15px; border-bottom: 2px solid #1abc9c; padding-bottom: 5px; color: #1abc9c; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        select, input { width: 100%; padding: 10px; border: none; border-radius: 5px; margin-bottom: 15px; font-size: 16px; box-sizing: border-box;}
        button { width: 100%; padding: 12px; background: #1abc9c; border: none; color: #fff; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-bottom: 10px; }
        button:hover { background: #16a085; }
        .btn-danger { background: #e74c3c; } .btn-danger:hover { background: #c0392b; }
        .btn-warning { background: #f39c12; } .btn-warning:hover { background: #d35400; }
        .score-control { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; background: #2c3e50; padding: 10px; border-radius: 5px; }
        .score-btn { width: auto; padding: 5px 15px; margin: 0 5px; }
        #timer-display { font-size: 24px; font-weight: bold; color: #e74c3c; text-align: center; margin: 10px 0; }
        
        /* 🎯 題目快捷鍵網格排版 */
        .topic-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; margin-top: 5px; }
        @media (max-width: 500px) { .topic-grid { grid-template-columns: repeat(2, 1fr); } } 
        .btn-topic { padding: 10px; color: #fff; font-size: 13px; font-weight: normal; border-radius: 5px; border: none; cursor: pointer; text-align: center; margin-bottom: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-topic:hover { transform: scale(1.02); opacity: 0.9; }
        
        /* 🎨 用顏色區分出題組別，方便後台肉眼識別 */
        .t-g1 { background: #2980b9; } /* 藍色 - G1 */
        .t-g2 { background: #27ae60; } /* 綠色 - G2 */
        .t-g3 { background: #8e44ad; } /* 紫色 - G3 */

        /* 👑 戰局監控排版優化 */
        .preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        @media (max-width: 480px) { .preview-grid { grid-template-columns: 1fr; } } 
        
        .preview-container { text-align: center; background: #2c3e50; padding: 10px; border-radius: 5px; }
        #adminPreviewCanvas { background: #fff; border-radius: 5px; width: 100%; height: 180px; display: block; }
        
        /* 💬 後台聊天室樣式 */
        .admin-chat-container { background: #2c3e50; padding: 10px; border-radius: 5px; display: flex; flex-direction: column; text-align: left; }
        .admin-chat-messages { height: 180px; overflow-y: auto; font-size: 13px; display: flex; flex-direction: column; gap: 5px; padding-right: 5px; }
        .msg { padding: 4px 8px; border-radius: 5px; background: #34495e; width: fit-content; max-width: 90%; color: #fff; }
        .msg.system { background: #2ecc71; color: #fff; font-weight: bold; align-self: center; text-align: center; font-size: 11px; }

        .status-badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 14px; font-weight: bold; margin-left: 10px; }
        .status-playing { background: #2ecc71; color: #fff; }
        .status-guessed { background: #f1c40f; color: #000; }
        .status-waiting { background: #95a5a6; color: #fff; }
    </style>
</head>
<body>

    <h1>主控後台</h1>
    
    <div class="card">
        <h2>新回合發布面板</h2>
        
        <label>當前手動選擇組別（點擊快捷鍵時會被自動切換）：</label>
        <select id="active-team">
            <option value="G1">G1 組作畫</option>
            <option value="G2">G2 組作畫</option>
            <option value="G3">G3 組作畫</option>
        </select>

        <label>設定限時秒數：</label>
        <input type="number" id="round-time" value="60" min="5">

        <label>點擊題目自動切換組別並直接發布：</label>
        <div class="topic-grid">
            <button class="btn-topic t-g1" onclick="quickStartRound('Sweet potato balls', 'G1')">1. Sweet potato</button>
            <button class="btn-topic t-g2" onclick="quickStartRound('samgsung', 'G2')">2. samgsung</button>
            <button class="btn-topic t-g3" onclick="quickStartRound('Kimchi', 'G3')">3. Kimchi</button>
            
            <button class="btn-topic t-g1" onclick="quickStartRound('Ring Toss', 'G1')">4. Ring Toss</button>
            <button class="btn-topic t-g2" onclick="quickStartRound('Hugo', 'G2')">5. Hugo</button>
            <button class="btn-topic t-g3" onclick="quickStartRound('Taipei 101', 'G3')">6. Taipei 101</button>
            
            <button class="btn-topic t-g1" onclick="quickStartRound('cat', 'G1')">7. cat</button>
            <button class="btn-topic t-g2" onclick="quickStartRound('bubble tea', 'G2')">8. bubble tea</button>
            <button class="btn-topic t-g3" onclick="quickStartRound('Seoul Tower', 'G3')">9. Seoul Tower</button>
            
            <button class="btn-topic t-g1" onclick="quickStartRound('IPhone', 'G1')">10. IPhone</button>
            <button class="btn-topic t-g2" onclick="quickStartRound('hotpot', 'G2')">11. hotpot</button>
            <button class="btn-topic t-g3" onclick="quickStartRound('smart delivery car', 'G3')">12. smart delivery</button>
        </div>

        <div style="border-top: 1px dashed #555; padding-top: 10px; margin-top: 15px;">
            <label>或者手動輸入自訂題目（使用上方手動選擇的組別）：</label>
            <input type="text" id="target-word" placeholder="例如：珍珠奶茶..." autocomplete="off">
            <button onclick="startRound()">🚀 派發自訂題目 </button>
        </div>
        
        <button class="btn-danger" onclick="clearCanvas()" style="margin-top: 5px;">🧹 僅清空畫布</button>
    </div>

    <div class="card">
        <h2>目前戰局監控</h2>
        <div style="margin-bottom: 10px; font-size: 16px;">
            <span>當前狀態：<span id="adm-status" class="status-badge status-waiting">準備中</span></span><br>
            <span style="margin-top: 5px; display:inline-block;">當前題目：<b id="adm-current-word" style="color: #f1c40f;">無</b></span>
        </div>
        <div id="timer-display">⏳ <span id="adm-timer">0</span> 秒</div>
        
        <div class="preview-grid">
            <div class="preview-container">
                <div style="font-size: 12px; color: #bdc3c7; margin-bottom: 5px; text-align: left;">🎨 畫布即時預覽：</div>
                <canvas id="adminPreviewCanvas"></canvas>
            </div>
            <div class="admin-chat-container">
                <div style="font-size: 12px; color: #bdc3c7; margin-bottom: 5px;">💬 玩家即時對話：</div>
                <div class="admin-chat-messages" id="adm-chat-box"></div>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>手動答對題數微調</h2>
        <div class="score-control">
            <span>G1 題數: <b id="adm-score-G1">0</b></span>
            <div>
                <button class="score-btn" onclick="adjustScore('G1', 1)">+1 </button>
                <button class="score-btn btn-danger" onclick="adjustScore('G1', -1)">-1</button>
            </div>
        </div>
        <div class="score-control">
            <span>G2 題數: <b id="adm-score-G2">0</b></span>
            <div>
                <button class="score-btn" onclick="adjustScore('G2', 1)">+1 </button>
                <button class="score-btn btn-danger" onclick="adjustScore('G2', -1)">-1</button>
            </div>
        </div>
        <div class="score-control">
            <span>G3 題數: <b id="adm-score-G3">0</b></span>
            <div>
                <button class="score-btn" onclick="adjustScore('G3', 1)">+1 </button>
                <button class="score-btn btn-danger" onclick="adjustScore('G3', -1)">-1</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>遊戲終局控制</h2>
        <button class="btn-warning" onclick="triggerFinalResult()">🏆 進行最終結算（全場跳轉排行）</button>
        <button class="btn-danger" onclick="resetEntireGame()">⚠️ 全局徹底重設（釋放畫面上鎖）</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAfVdbS6K6qMNvw8rdHoGMYjnMTH4QoygM",
            authDomain: "u-draw-i-guess.firebaseapp.com",
            databaseURL: "https://u-draw-i-guess-default-rtdb.firebaseio.com/", 
            projectId: "u-draw-i-guess",
            storageBucket: "u-draw-i-guess.firebasestorage.app",
            messagingSenderId: "527918146258",
            appId: "1:527918146258:web:86d26163b5c5464368830b"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        } else {
            firebase.app();
        }
        const db = firebase.database();
        let timerInterval = null;

        // 👑 預覽畫布設定
        const pCanvas = document.getElementById('adminPreviewCanvas');
        const pCtx = pCanvas.getContext('2d');
        function initPreviewCanvas() {
            pCanvas.width = pCanvas.parentElement.clientWidth;
            pCanvas.height = 180;
            pCtx.lineCap = 'round';
        }
        window.addEventListener('load', initPreviewCanvas);
        window.addEventListener('resize', initPreviewCanvas);

        db.ref('teams').on('value', snapshot => {
            const data = snapshot.val();
            document.getElementById('adm-score-G1').innerText = data?.G1?.score || 0;
            document.getElementById('adm-score-G2').innerText = data?.G2?.score || 0;
            document.getElementById('adm-score-G3').innerText = data?.G3?.score || 0;
        });

        db.ref('gameState/timer').on('value', snapshot => {
            const t = snapshot.val();
            document.getElementById('adm-timer').innerText = t !== null ? t : 0;
        });

        // 👑 監聽整體遊戲狀態
        db.ref('gameState').on('value', snapshot => {
            const state = snapshot.val();
            if(!state) return;
            
            document.getElementById('adm-current-word').innerText = state.currentWord || "無";
            
            const statusEl = document.getElementById('adm-status');
            if(state.status === 'playing') {
                if(state.isGuessed) {
                    statusEl.innerText = "已被答對 🎉";
                    statusEl.className = "status-badge status-guessed";
                    clearInterval(timerInterval);
                } else if(state.timer <= 0) {
                    statusEl.innerText = "時間到 ⏰";
                    statusEl.className = "status-badge status-waiting";
                    clearInterval(timerInterval);
                } else {
                    statusEl.innerText = `${state.activeTeam} 作畫中`;
                    statusEl.className = "status-badge status-playing";
                }
            } else if(state.status === 'result') {
                statusEl.innerText = "終局排行中 🏆";
                statusEl.className = "status-badge status-guessed";
                clearInterval(timerInterval);
            } else {
                statusEl.innerText = "等待開局 ⏳";
                statusEl.className = "status-badge status-waiting";
                clearInterval(timerInterval);
            }
        });

        // 👑 同步繪製後台的監視畫布
        db.ref('drawing').on('child_added', snapshot => {
            const pt = snapshot.val();
            pCtx.strokeStyle = pt.color;
            pCtx.lineWidth = pt.width * (pCanvas.height / 250);
            pCtx.beginPath();
            pCtx.moveTo(pt.x1 * pCanvas.width, pt.y1 * pCanvas.height);
            pCtx.lineTo(pt.x2 * pCanvas.width, pt.y2 * pCanvas.height);
            pCtx.stroke();
        });

        db.ref('drawing').on('value', snapshot => {
            if(!snapshot.exists()) pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
        });

        // 👑 後台即時同步聊天室訊息
        db.ref('messages').limitToLast(20).on('value', snapshot => {
            const box = document.getElementById('adm-chat-box');
            box.innerHTML = "";
            snapshot.forEach(child => {
                const m = child.val();
                const div = document.createElement('div');
                if(m.sender === 'SYSTEM') {
                    div.className = 'msg system';
                } else {
                    div.className = 'msg';
                }
                div.innerText = m.text;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });

        // 🎯 這次的核心修改：快捷按鈕傳入題目與指定組別
        function quickStartRound(wordText, targetTeam) {
            // 1. 自動幫下拉選單切換成該題目對應的組別
            document.getElementById('active-team').value = targetTeam;
            // 2. 自動填入題目文字
            document.getElementById('target-word').value = wordText;
            // 3. 執行標準發布
            startRound();
        }

        function startRound() {
            const team = document.getElementById('active-team').value;
            const word = document.getElementById('target-word').value.trim();
            let seconds = parseInt(document.getElementById('round-time').value);

            if(!word) { alert('請先輸入題目！'); return; }
            if(isNaN(seconds) || seconds <= 0) seconds = 60;

            clearInterval(timerInterval);

            db.ref('gameState').set({
                status: 'playing',
                activeTeam: team,
                currentWord: word,
                isGuessed: false,
                timer: seconds
            });

            db.ref('drawing').remove();
            db.ref('messages').push({
                sender: 'SYSTEM',
                text: `📢 Round Started! [${team}] is drawing now. Time limit: ${seconds}s!`
            });

            timerInterval = setInterval(() => {
                db.ref('gameState').once('value', snap => {
                    const currentStatus = snap.val();
                    if (!currentStatus || currentStatus.isGuessed || currentStatus.status !== 'playing') {
                        clearInterval(timerInterval);
                        return;
                    }

                    seconds--;
                    db.ref('gameState/timer').set(seconds);

                    if(seconds <= 0) {
                        clearInterval(timerInterval);
                        if(!currentStatus.isGuessed) {
                            db.ref('messages').push({ sender: 'SYSTEM', text: `⏰ Time's up! The answer was [ ${word} ]. No points awarded.` });
                        }
                    }
                });
            }, 1000);

            document.getElementById('target-word').value = "";
        }

        function clearCanvas() { db.ref('drawing').remove(); }
        function adjustScore(team, amount) { db.ref(`teams/${team}/score`).transaction(s => (s || 0) + amount); }

        function triggerFinalResult() {
            if(confirm('確定要結束遊戲並向全場公布最終名次嗎？')) {
                clearInterval(timerInterval);
                db.ref('gameState/status').set('result');
                db.ref('messages').push({ sender: 'SYSTEM', text: '🏆 Game Over! Showing final rankings on screens!' });
            }
        }

        function resetEntireGame() {
            if(confirm('確定要完全重置所有資料嗎？')) {
                clearInterval(timerInterval);
                db.ref('/').set({
                    gameState: { status: 'waiting', activeTeam: '', currentWord: '', isGuessed: false, timer: 0 },
                    teams: { G1: {score:0}, G2: {score:0}, G3: {score:0} },
                    messages: { init: { sender: 'SYSTEM', text: 'Game reset! Ready for a new game.' } }
                });
                db.ref('drawing').remove();
            }
        }
    </script>
</body>
</html>
